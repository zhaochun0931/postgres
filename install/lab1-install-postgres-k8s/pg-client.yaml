apiVersion: v1
kind: Pod
metadata:
  name: pg-client
  namespace: default
spec:
  containers:
  - name: postgres
    image: postgres:16 # Using a specific version is better than 'latest'
    command: ["/bin/bash"]
    stdin: true        # Equivalent to -i (interactive)
    tty: true          # Equivalent to -t (terminal)
  restartPolicy: Never # Equivalent to --rm (when combined with kubectl delete)
