services:
  # The Database
  db:
    image: postgres:latest
    container_name: mcp-postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: dev_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d dev_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # The MCP Server (Official Node.js implementation)
